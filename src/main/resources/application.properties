spring.application.name=anonymousplatform

# ===============================
# TiDB Cloud Database Connection
# ===============================
spring.datasource.url=jdbc:mysql://<HOST>:4000/test?useSSL=true&verifyServerCertificate=false
spring.datasource.username=root
spring.datasource.password=ctbCVC4sJ3l3QfkU
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ===============================
# Server
# ===============================
server.port=8080

# ===============================
# SMTP configuration for Email Verification
# Replace with actual email and app password for production
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
