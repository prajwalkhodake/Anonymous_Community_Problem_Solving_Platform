<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anonymous · Dashboard</title>
  <link rel="stylesheet" href="css/glass.css">
</head>
<body data-page="profile">

  <div class="mesh-bg"></div>
  <div class="glow-orb"></div>
  <div class="glow-orb"></div>
  <div class="glow-orb"></div>
  <div class="scan-line"></div>

  <!-- Nav -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="dashboard.html" class="nav-brand">
        <div class="nav-brand-icon">🎭</div>
        <span>Anonymous</span>
      </a>
      <div class="nav-links">
        <a href="dashboard.html" class="nav-link">📊 <span>Dashboard</span></a>
        <a href="community.html" class="nav-link">🏠 <span>Board</span></a>

        <!-- Profile Dropdown -->
        <div class="dropdown">
          <button class="dropdown-trigger">
            <div class="trigger-avatar trigger-initial">U</div>
            <span class="trigger-name">User</span>
            <span class="trigger-arrow">▼</span>
          </button>
          <div class="dropdown-menu">
            <div class="dropdown-header">
              <div class="dh-name dd-username">User</div>
              <div class="dh-email dd-email">user@email.com</div>
              <div class="dh-badge">🔒 Anonymous Mode</div>
            </div>
            <button class="dropdown-item" data-action="dashboard"><div class="di-icon">📊</div> Dashboard</button>
            <button class="dropdown-item" data-action="community"><div class="di-icon">🏠</div> Community Board</button>
            <button class="dropdown-item" data-action="change-name"><div class="di-icon">🎭</div> Change Identity</button>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item" data-action="clear-posts"><div class="di-icon">🗑️</div> Clear My Posts</button>
            <button class="dropdown-item danger" data-action="logout"><div class="di-icon">🚪</div> Logout</button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <div class="container page-wrapper">
        <section class="dash-section">
      <div class="dash-hero">
        <h1>Your Profile</h1>
        <p>Manage your identity and posts</p>
      </div>

      <div class="profile-card glass" style="padding: 30px; text-align: center; margin-bottom: 40px; border-radius: 24px;">
        <div id="profileAvatar" class="post-avatar av-teal" style="width: 80px; height: 80px; font-size: 2.5rem; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center;">U</div>
        <h2 id="profileName" style="font-size: 2rem; margin-bottom: 5px;">Username</h2>
        <div style="font-size: 1.2rem; color: rgba(255,255,255,0.8); margin-bottom: 25px;">
          Trust Score: <span id="profileTrustScore" class="trust-badge" style="font-size: 1.1rem;">0</span>
        </div>
        <button class="btn btn-glow" id="changeIdentityBtn" style="width: auto; padding: 12px 24px;">Change Identity</button>
      </div>

      <div class="profile-feed">
        <h3 style="margin-bottom: 20px; font-size: 1.5rem; font-weight: 500;">Your Recent Activity</h3>
        <div id="profileFeed" class="community-feed"></div> <!-- Reusing community styles -->
      </div>
    </section>
  </div>

  <!-- FOOTER TASKBAR -->
  <footer class="taskbar">
    <div class="taskbar-inner">
      <button class="tb-item" data-page="dashboard.html">
        <span class="tb-icon">📊</span>
        <span>Dashboard</span>
      </button>
      <button class="tb-item" data-page="community.html">
        <span class="tb-icon">🏠</span>
        <span>Board</span>
      </button>
      <button class="tb-compose" id="tbCompose">✏️</button>
      <button class="tb-item" data-page="community.html">
        <span class="tb-icon">🔍</span>
        <span>Explore</span>
      </button>
      <button class="tb-item active" data-page="profile.html">
        <span class="tb-icon">👤</span>
        <span>Profile</span>
      </button>
    </div>
  </footer>

  <!-- COMPOSER MODAL -->
  <div class="modal-overlay" id="composerModal">
    <div class="modal-glass">
      <div class="modal-top">
        <h3>🎭 Share Anonymously</h3>
        <button class="modal-close" id="modalClose">✕</button>
      </div>

      <div class="field">
        <label class="field-label">Title</label>
        <input class="field-input field-input--plain" type="text" id="mTitle" placeholder="What's on your mind?">
      </div>
      <div class="field">
        <label class="field-label">Description</label>
        <textarea class="field-textarea" id="mBody" placeholder="Describe your problem in detail…"></textarea>
      </div>

      <div class="tag-row">
        <button class="tag-chip" data-tag="general">⚪ General</button>
        <button class="tag-chip" data-tag="urgent">🔴 Urgent</button>
        <button class="tag-chip" data-tag="help">🟡 Need Help</button>
        <button class="tag-chip" data-tag="discussion">🔵 Discussion</button>
        <button class="tag-chip" data-tag="advice">🟣 Advice</button>
      </div>

      <div class="composer-footer">
        <div class="toggle-wrap">
          <label class="toggle">
            <input type="checkbox" id="mAnonToggle" checked>
            <span class="toggle-track"></span>
          </label>
          <span>Post Anonymously</span>
        </div>
        <button class="btn btn-glow btn-sm" id="modalPostBtn" style="width:auto">🚀 Post</button>
      </div>
    </div>
  </div>

  <script src="js/glass-app.js"></script>
</body>
</html>
