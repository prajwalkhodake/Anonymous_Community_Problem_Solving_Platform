<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anonymous · Login</title>
  <link rel="stylesheet" href="css/glass.css">
</head>
<body data-page="auth">

  <div class="mesh-bg"></div>
  <div class="glow-orb"></div>
  <div class="glow-orb"></div>
  <div class="glow-orb"></div>
  <div class="scan-line"></div>

  <div class="auth-page page-wrapper">
    <div class="auth-glass glass-static">

      <div class="auth-logo">
        <div class="auth-logo-icon">🎭</div>
        <h1>Anonymous</h1>
        <p>Share problems. Get solutions. Stay hidden.</p>
      </div>

      <div class="auth-switcher">
        <button class="auth-switcher-btn active" id="tabLogin">Login</button>
        <button class="auth-switcher-btn" id="tabSignup">Sign Up</button>
      </div>

      <form id="formLogin">
        <div class="field">
          <label class="field-label">Email</label>
          <div class="field-input-wrap">
            <span class="field-icon">📧</span>
            <input class="field-input" type="email" id="lEmail" placeholder="you@example.com" required>
          </div>
        </div>
        <div class="field">
          <label class="field-label">Password</label>
          <div class="field-input-wrap">
            <span class="field-icon">🔒</span>
            <input class="field-input" type="password" id="lPass" placeholder="Enter your password" required>
          </div>
        </div>
        <button type="submit" class="btn btn-glow">Login →</button>
      </form>

      <form id="formSignup" class="hidden">
        <div class="field">
          <label class="field-label">Email</label>
          <div class="field-input-wrap">
            <span class="field-icon">📧</span>
            <input class="field-input" type="email" id="sEmail" placeholder="you@example.com" required>
          </div>
        </div>
        <div class="field">
          <label class="field-label">Password</label>
          <div class="field-input-wrap">
            <span class="field-icon">🔒</span>
            <input class="field-input" type="password" id="sPass" placeholder="Min 6 characters" required>
          </div>
        </div>
        <div class="field">
          <label class="field-label">Confirm Password</label>
          <div class="field-input-wrap">
            <span class="field-icon">🔒</span>
            <input class="field-input" type="password" id="sConfirm" placeholder="Re-enter password" required>
          </div>
        </div>

        <div class="field" style="display: flex; align-items: center; gap: 8px; margin-top: 10px; margin-bottom: 20px;">
          <input type="checkbox" id="termsCheck" required style="cursor: pointer;">
          <label for="termsCheck" style="font-size: 0.85rem; color: var(--text-2); cursor: pointer;">
            I agree to the <a href="#" style="color: var(--accent-1); text-decoration: underline;">Community Rules & Terms</a>
          </label>
        </div>

        <button type="submit" class="btn btn-glow">Create Account →</button>
      </form>

    </div>
  </div>

  <script src="js/glass-app.js"></script>
</body>
</html>
