<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel | Anonymous Platform</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="css/glass.css">
  <style>
    /* Specific Admin UI Styles to keep it distinct */
    .admin-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .admin-stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .admin-card {
      padding: 24px;
      text-align: center;
    }
    .admin-card .stat-val {
      font-size: 2.5rem;
      font-weight: 700;
      color: #fff;
      margin: 10px 0;
    }
    .admin-card .stat-lbl {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .admin-tabs {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
      justify-content: center;
    }
    .admin-tab-btn {
      padding: 10px 24px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      color: #fff;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.3s ease;
    }
    .admin-tab-btn.active {
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.4);
    }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    .admin-table th, .admin-table td {
      padding: 15px;
      text-align: left;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.9);
    }
    .admin-table th {
      font-weight: 600;
      color: #fff;
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 1px;
    }
    .admin-table tbody tr:hover {
      background: rgba(255, 255, 255, 0.03);
    }
    .action-btn {
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      color: #fff;
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.3);
      transition: all 0.2s;
    }
    .action-btn:hover {
      background: rgba(239, 68, 68, 0.5);
    }
    .panel-section { display: none; }
    .panel-section.active { display: block; }
  </style>
</head>
<body data-page="admin">
  <div class="mesh-bg"></div>
  <div class="glow-orb"></div>
  <div class="glow-orb"></div>
  <div class="glow-orb"></div>
  <div class="scan-line"></div>

  <!-- ADMIN LOGIN SECTION -->
  <div class="auth-page page-wrapper" id="adminLoginSection">
    <div class="auth-glass glass-static">
      <div class="auth-logo">
        <h2 style="color: #ff6b6b;"><i class="fa-solid fa-shield-halved"></i> Admin Portal</h2>
        <p>Restricted access</p>
      </div>

      <form id="adminLoginForm">
        <div class="field">
          <label class="field-label">Admin ID</label>
          <div class="field-input-wrap">
            <i class="fa-solid fa-user-shield"></i>
            <input class="field-input" type="text" id="adminId" placeholder="Enter admin ID" required>
          </div>
        </div>
        <div class="field">
          <label class="field-label">Password</label>
          <div class="field-input-wrap">
            <i class="fa-solid fa-lock"></i>
            <input class="field-input" type="password" id="adminPass" placeholder="Enter strictly restricted password" required>
          </div>
        </div>
        <button type="submit" class="btn btn-glow" style="width: 100%; margin-top: 10px; background: rgba(239, 68, 68, 0.7);"><i class="fa-solid fa-right-to-bracket"></i> Login as Admin</button>
      </form>
      <div style="text-align: center; margin-top: 20px;">
        <a href="index.html" class="auth-link"><i class="fa-solid fa-arrow-left"></i> Back to User Site</a>
      </div>
    </div>
  </div>

  <!-- ADMIN DASHBOARD SECTION -->
  <div class="admin-container" id="adminDashboardSection" style="display: none;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
      <h1 style="color: #fff;"><i class="fa-solid fa-shield-halved"></i> Admin Control Panel</h1>
      <button class="btn" id="adminLogoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
    </div>

    <!-- Stats -->
    <div class="admin-stats-row">
      <div class="glass admin-card">
        <i class="fa-solid fa-users fa-2x" style="color: #4facfe;"></i>
        <div class="stat-val" id="adminStatUsers">0</div>
        <div class="stat-lbl">Total Users</div>
      </div>
      <div class="glass admin-card">
        <i class="fa-solid fa-layer-group fa-2x" style="color: #00f2fe;"></i>
        <div class="stat-val" id="adminStatPosts">0</div>
        <div class="stat-lbl">Total Posts</div>
      </div>
      <div class="glass admin-card">
        <i class="fa-solid fa-comments fa-2x" style="color: #43e97b;"></i>
        <div class="stat-val" id="adminStatResponses">0</div>
        <div class="stat-lbl">Total Responses</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="admin-tabs">
      <button class="admin-tab-btn active" data-target="manageUsers">Manage Users</button>
      <button class="admin-tab-btn" data-target="managePosts">Manage Posts</button>
      <button class="admin-tab-btn" data-target="manageReports">Manage Reports</button>
    </div>

    <!-- Users Panel -->
    <div class="glass panel-section active" id="manageUsers">
      <h3><i class="fa-solid fa-users"></i> Platform Users</h3>
      <div style="overflow-x: auto;">
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Username</th>
              <th>Email</th>
              <th>Trust Score</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="adminUsersTbody">
            <!-- Rendered via JS -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- Posts Panel -->
    <div class="glass panel-section" id="managePosts">
      <h3><i class="fa-solid fa-layer-group"></i> Platform Posts</h3>
      <div style="overflow-x: auto;">
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Author</th>
              <th>Title</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="adminPostsTbody">
            <!-- Rendered via JS -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- Reports Panel -->
    <div class="glass panel-section" id="manageReports">
      <h3><i class="fa-solid fa-flag"></i> Reports</h3>
      <div style="overflow-x: auto;">
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Type</th>
              <th>Reason</th>
              <th>Reported By</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="adminReportsTbody">
            <!-- Rendered via JS -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="js/glass-app.js"></script>
</body>
</html>
